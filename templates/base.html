<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}驗車場預約系統{% endblock %}</title>
  <style>
    :root {
      --ink: #17212b; --muted: #5c6975; --line: #d7dee5;
      --paper: #f3f6f8; --panel: #ffffff; --teal: #1f6f78;
      --teal-dark: #174f57; --orange: #d66a31; --green: #3d7d46;
      --red: #b94e36; --amber: #b7792c;
      --soft-teal: #e7f2f4; --soft-orange: #fff1e8;
      --soft-green: #edf6ee; --soft-red: #fff0ee;
      --shadow: 0 16px 36px rgba(23,33,43,0.09);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft JhengHei","PingFang TC","Noto Sans TC",Arial,sans-serif;
      background: var(--paper); color: var(--ink); line-height: 1.55;
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; padding: 20px; box-shadow: var(--shadow);
    }
    .card.accent { background: var(--soft-teal); border-color: #c4dde1; }
    .card.orange { background: var(--soft-orange); border-color: #f0c6a8; }
    .card.green { background: var(--soft-green); border-color: #c8dfca; }
    .badge {
      display: inline-flex; align-items: center; min-height: 30px;
      padding: 4px 12px; border-radius: 999px; font-size: 13px;
      font-weight: 800; white-space: nowrap;
    }
    .badge.open { color: var(--green); background: var(--soft-green); }
    .badge.normal { color: var(--teal); background: var(--soft-teal); }
    .badge.busy { color: var(--amber); background: #fff5df; }
    .badge.full { color: var(--red); background: var(--soft-red); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 40px; padding: 8px 18px; border-radius: 8px;
      border: none; font-weight: 800; font-size: 15px;
    }
    .btn-primary { background: var(--teal); color: #fff; }
    .btn-primary:hover { background: var(--teal-dark); }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-orange:hover { opacity: 0.9; }
    .btn-outline { background: #fff; border: 1px solid var(--line); color: var(--ink); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm { min-height: 34px; padding: 4px 14px; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-size: 13px; }
    input, select, textarea {
      width: 100%; min-height: 42px; border: 1px solid var(--line);
      border-radius: 8px; padding: 8px 12px; background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }
    label { display: grid; gap: 4px; font-weight: 700; color: var(--muted); font-size: 14px; }
    .nav-bar {
      background: #132932; color: #fff; padding: 0 20px;
      display: flex; align-items: center; gap: 24px; min-height: 56px;
    }
    .nav-bar .brand { font-weight: 800; font-size: 18px; color: #fff; text-decoration: none; margin-right: auto; }
    .nav-bar .brand:hover { text-decoration: none; }
    .nav-bar a { color: rgba(255,255,255,0.78); font-weight: 700; font-size: 14px; }
    .nav-bar a:hover, .nav-bar a.active { color: #fff; text-decoration: none; }
    .nav-bar a.admin-link { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 4px; }
    .footer-note {
      text-align: center; padding: 20px; font-size: 13px; color: var(--muted);
      border-top: 1px solid var(--line); margin-top: 40px;
    }
    .eyebrow { font-size: 13px; color: var(--orange); font-weight: 800; margin-bottom: 4px; }
    h1 { font-size: 28px; line-height: 1.25; }
    h2 { font-size: 20px; margin-bottom: 12px; }
    .muted { color: var(--muted); }
    @media (max-width: 720px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .nav-bar { flex-wrap: wrap; gap: 10px; padding: 10px 16px; }
      .nav-bar .brand { width: 100%; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="brand">驗車場系統</a>
    <a href="/">車主首頁</a>
    <a href="/reserve">線上預約</a>
    <a href="/public">公共看板</a>
    {% if is_admin %}
    <a href="/dashboard" class="admin-link">廠內中控</a>
    <a href="/vehicles" class="admin-link">車籍管理</a>
    <a href="/admin/learning-progress" class="admin-link">學習進度</a>
    <a href="/learning" class="admin-link">學習歷程</a>
    <a href="/admin/logout" class="admin-link" style="margin-left:auto;opacity:0.7;">登出管理</a>
    {% else %}
    <a href="/admin/login" style="margin-left:auto;">管理登入</a>
    {% endif %}
  </nav>
  <main class="container" style="padding-top:24px;padding-bottom:24px;">
    {% block content %}{% endblock %}
  </main>
  <div class="footer-note">驗車場智慧預約與流場管理系統 — 展示版本</div>
</body>
</html>
